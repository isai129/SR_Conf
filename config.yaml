# ==========================================================
# Mihomo (Clash Meta) Final Fix - All Rules Valid
# ==========================================================

port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: true
mode: Rule
log-level: warning
unified-delay: true
external-controller: 0.0.0.0:9090
secret: 

experimental:
  ignore-resolve-fail: true

# --- 1. Providers ---
proxy-providers:
  local_nodes:
    type: file
    path: ./zhs.tw.yaml
    health-check:
      enable: true
      interval: 7200 # 2小时后台静默检查
      url: http://www.gstatic.com/generate_204

  remote_sub:
    type: http
    url: https:// # <--- 请填入机场链接
    interval: 86400
    path: ./sub/airport.yaml
    health-check:
      enable: true
      interval: 7200 # 2小时后台静默检查
      url: http://www.gstatic.com/generate_204

# --- 2. Core Network ---
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack: [any:53]
  strict-route: true
  mtu: 9000

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver: [119.29.29.29, 223.5.5.5]
  nameserver:
    - https://223.5.5.5/dns-query
    - https://dns.alidns.com/dns-query
    - tls://1.1.1.1:853
  fake-ip-filter: ['+.*', '192.168.240.1', 'msftconnecttest.com', 'msftncsi.com', '+.pool.ntp.org', '+.nflxvideo.net']

# --- 3. Proxy Groups ---
proxy-groups:
 # 【1. 服务总控 - 决定什么应用走哪里】
  - name: Proxy
    type: select
    use: [remote_sub]
    proxies: [Fallback,Auto, HK, TW, JP, US, SG, DIRECT]
    
 #  故障转移组
  - name: Fallback
    type: fallback
    use: [remote_sub]
    url: http://www.gstatic.com/generate_204
    interval: 600 # 10分钟检查一次
    
  - name: AI
    type: select
    proxies: [TW, US, JP, SG, HK, Proxy]

  - name: GitHub
    type: select
    proxies: [US, SG, HK, Auto, Proxy]

  - name: Steam
    type: select
    proxies: [DIRECT, HK, TW, US, Proxy]

  - name: Microsoft
    type: select
    proxies: [DIRECT,TW, US, Proxy]

  - name: Apple
    type: select
    proxies: [DIRECT, TW, HK, Auto, Proxy]

  - name: Google
    type: select
    proxies: [TW, SG, JP, HK,Auto, Proxy]

  - name: Telegram
    type: select
    proxies: [Auto, SG, HK, Proxy]

  - name: Unlock # 国内视频解锁（针对贝塔、盛宴节点）
    type: select
    use: [remote_sub]
    filter: "(?i)CN|中国|貝塔|贝塔|盛宴"
    proxies:
      - DIRECT

  # 【2. 地区池 - 纯物理筛选，已开启懒加载】
  - name: Auto
    type: url-test
    use: [remote_sub]
    filter: "^(?i)(?!.*x5).*(HK|TW|JP|US|SG)" # 自动优选排除 x5 节点
    interval: 1800 # 0.5小时测速一次
    tolerance: 20
    lazy: false #关闭只有切换到此组才激活测速，解决测速频繁问题
    url: http://www.gstatic.com/generate_204

  - name: HK
    type: url-test
    use: [remote_sub]
    filter: "(?i)HK|香港|九龙|九龍|波澜|波瀾|嘉禾|安魂|铠甲|鎧甲|契约|契約|奇点|奇點|判官|灵魂"
    interval: 3600
    lazy: true

  - name: TW
    type: url-test
    use: [remote_sub]
    filter: "(?i)TW|台湾|台灣|台北|彰化|宝岛|寶島|动画疯|動畫瘋"
    interval: 3600
    lazy: true

  - name: JP
    type: url-test
    use: [remote_sub]
    filter: "(?i)JP|日本|東京|大和|柯南|星移"
    interval: 3600
    lazy: true

  - name: US
    type: url-test
    use: [remote_sub]
    filter: "(?i)US|美国|美國|加州|川谱|川譜|神像|胜地|勝地|空灵"
    interval: 3600
    lazy: true

  - name: SG
    type: url-test
    use: [remote_sub]
    filter: "(?i)SG|新加坡|星岛|星島|烈焰"
    interval: 3600
    lazy: true

  - name: Final
    type: select
    proxies: [Proxy, DIRECT]

# --- 4. Rule Providers (补全 Private 修正 404) ---
rule-providers:
  # --- 基础库 ( Loyalsoldier 源，行为修正为 domain/ipcidr 以免解析报错 ) ---
  Ads:
    type: http
    behavior: domain
    path: ./rules/ads.yaml
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt
    interval: 86400

  Private:
    type: http
    behavior: domain
    path: ./rules/private.yaml
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt
    interval: 86400
   
  # --- 专项黑名单 (被屏蔽的网站直达) ---
  GFWList:
    type: http
    behavior: domain
    path: ./rules/gfwlist.yaml
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt
    interval: 86400

  China:
    type: http
    behavior: domain
    path: ./rules/china.yaml
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt
    interval: 86400

  ChinaIP:
    type: http
    behavior: ipcidr
    path: ./rules/chinaip.yaml
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt
    interval: 86400

  # --- 专项库 ( Blackmatrix7 源，使用 classical 行为兼容 YAML 格式 ) ---
  AI:
    type: http
    behavior: classical
    path: ./rules/ai.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
    interval: 86400

  GitHub:
    type: http
    behavior: classical
    path: ./rules/github.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml
    interval: 86400
    
  Docker:
    type: http
    behavior: classical
    path: ./rules/docker.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Docker/Docker.yaml
    interval: 86400

  Steam:
    type: http
    behavior: classical
    path: ./rules/steam.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Steam/Steam.yaml
    interval: 86400

  Apple:
    type: http
    behavior: classical
    path: ./rules/apple.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml
    interval: 86400

  Google:
    type: http
    behavior: classical
    path: ./rules/google.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.yaml
    interval: 86400

  Telegram:
    type: http
    behavior: classical
    path: ./rules/telegram.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
    interval: 86400

  Microsoft:
    type: http
    behavior: classical
    path: ./rules/microsoft.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.yaml
    interval: 86400
   

# --- 4. Rules 分流 ---
rules:
  # ------------------------------------------------------------
  # 【自定义 - 优先级最高】在此处添加你的单条临时规则
  # ------------------------------------------------------------
  # - DOMAIN,example.com,DIRECT              # 精确匹配域名
  # - DOMAIN-SUFFIX,google.com,Proxy         # 后缀匹配（最推荐）
  # - DOMAIN-KEYWORD,openai,AI               # 关键字匹配
  # - IP-CIDR,1.1.1.1/32,HK,no-resolve       # 单个 IP 匹配
  # - IP-CIDR,192.168.1.0/24,DIRECT          # 局域网绕过
  
  # --- 基础过滤 (必须放在前面) ---
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve      # 补充常见局域网段
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve   # 补充常见局域网段
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,192.254.0.0/16,DIRECT,no-resolve  
  - RULE-SET,Ads,REJECT
  - RULE-SET,Private,DIRECT
  - IP-CIDR6,::/0,REJECT,no-resolve

  # --- 1024 --- 
  - DOMAIN-SUFFIX,t66y.com,HK
  - DOMAIN-SUFFIX,x.com,Proxy
  - DOMAIN-SUFFIX,zhs.tw,TW
  

  # --- 群暉/本地設備 ---
  - DOMAIN-SUFFIX,synology.com,DIRECT
  - DOMAIN-SUFFIX,quickconnect.to,DIRECT
  - DOMAIN-KEYWORD,nas,DIRECT    

  # --- 业务分流 (引用远程 Providers) ---
  - RULE-SET,Docker,Proxy   # 强制 Docker 镜像拉取走代理
  - RULE-SET,Telegram,Telegram
  - RULE-SET,AI,AI
  - DOMAIN-SUFFIX,bing.com,AI
  - RULE-SET,GitHub,GitHub
  - RULE-SET,Steam,Steam
  - RULE-SET,Google,Google
  - RULE-SET,Apple,Apple
  - RULE-SET,Microsoft,Microsoft

  # --- 视频解锁 ---
  - DOMAIN-SUFFIX,bilibili.com,Unlock
  - DOMAIN-SUFFIX,iqiyi.com,Unlock

  # --- [新增] 黑名单分流 (专门识别被屏蔽网站) ---
  # 放在国内规则之前，确保被屏蔽但没在上方业务组的网站能走代理
  - RULE-SET,GFWList,Proxy

  # --- 兜底规则 (放在最后) ---
  # 1. 国内域名识别 (Domain 预判)
  - RULE-SET,China,DIRECT
  
  # 2. 国内 IP 识别 (IP 判定，no-resolve 防止因解析导致的漏网之鱼)
  - RULE-SET,ChinaIP,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve

  # 3. 最终匹配
  - MATCH,Final
