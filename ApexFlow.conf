RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/TikTok/TikTok.list,TIKTOK

# 兜底规则 (GFWList)
RULE-SET,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt,Auto

# 广告与隐私
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Advertising/Advertising.list,REJECT
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Privacy/Privacy.list,REJECT

GEOIP,CN,DIRECT
FINAL,Final

[Host]
*.apple.com = server:system
*.icloud.com = server:system
localhost = 127.0.0.1

https://www.merriam-webster.com/dictionary/rewrite
^https?://(www.)?g.cn https://www.google.com 302
^https?://(www.)?google.cn https://www.google.com 302

[MITM]
enable = true
# 建议只开启这些：
# 1. 消除 Google 网络检测提醒
hostname = *.google.cn, *.gstatic.com
# 2. (进阶) 如果你有拦截 App 开屏广告的需求，才在这里添加
# hostname = *.google.cn, *.gstatic.com, ads.xxx.com
