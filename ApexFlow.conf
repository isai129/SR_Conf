[General]
# TitanFlow Professional Configuration
# 高性能代理逻辑：拦截 QUIC 协议防止断流，开启 DoH 防 DNS 污染
bypass-system = true
ipv6 = false
prefer-ipv6 = false
dns-direct-system = true
dns-direct-fallback-proxy = true
icmp-auto-reply = true
private-ip-answer = true
block-quic = all
tun-excluded-routes = 10.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.88.99.0/24, 192.168.0.0/16, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 255.255.255.255/32, 239.255.255.250/32

[Proxy Group]
# --- 自动优选策略 (已绑定订阅源: zhs.futbol) ---
# 请确保你的 Shadowrocket 首页订阅名称完全匹配 "zhs.futbol"->use 逻辑从“指定名称”改为“自动匹配所有订阅”
Auto = url-test,interval=1800,tolerance=20,timeout=5,select=0,use=*,policy-regex-filter=(?i)^(?!.*x5).*(HK|TW|JP|US|SG)

HK = url-test,url=http://www.gstatic.com/generate_204,interval=3600,timeout=5,select=0,use=*,policy-regex-filter=(?i)HK|香港|九龙|九龍|波澜|波瀾|嘉禾|安魂|铠甲|鎧甲|契约|契約|奇点|奇點|判官|灵魂
TW = url-test,url=http://www.gstatic.com/generate_204,interval=3600,timeout=5,select=0,use=*,policy-regex-filter=(?i)TW|台湾|台灣|台北|彰化|宝岛|寶島|动画疯|動畫瘋
JP = url-test,url=http://www.gstatic.com/generate_204,interval=3600,timeout=5,select=0,use=*,policy-regex-filter=(?i)JP|日本|東京|大和|柯南|星移
US = url-test,url=http://www.gstatic.com/generate_204,interval=3600,timeout=5,select=0,use=*,policy-regex-filter=(?i)US|美国|美國|加州|川谱|川譜|神像|胜地|勝地|空灵
SG = url-test,url=http://www.gstatic.com/generate_204,interval=3600,timeout=5,select=0,use=*,policy-regex-filter=(?i)SG|新加坡|星岛|星島|烈焰

# --- 业务分流策略 ---
AI = select,Auto,HK,TW,JP,SG,US,policy-select-name=Auto
YouTube = select,Auto,HK,TW,JP,SG,US,policy-select-name=Auto
MAX = select,Auto,HK,TW,JP,SG,US,policy-select-name=Auto
SPOTIFY = select,DIRECT,Auto,HK,TW,JP,SG,US,policy-select-name=Auto
TELEGRAM = select,Auto,HK,TW,JP,SG,US,policy-select-name=Auto
PAYPAL = select,DIRECT,Auto,US,policy-select-name=US
TWITTER = select,Auto,HK,TW,JP,SG,US,policy-select-name=Auto
FACEBOOK = select,Auto,HK,TW,JP,SG,US,policy-select-name=Auto
AMAZON = select,DIRECT,Auto,US,policy-select-name=Auto
GAMING = select,DIRECT,Auto,HK,TW,JP,SG,US,policy-select-name=HK
MICROSOFT = select,DIRECT,Auto,TW,policy-select-name=TW
GOOGLE = select,Auto,TW,policy-select-name=TW
APPLE = select,DIRECT,Auto,TW,policy-select-name=TW
TIKTOK = select,Auto,US,policy-select-name=US
Final = select,Auto,DIRECT,policy-select-name=Auto

[Rule]
# 拦截 QUIC 提高连接稳定性
AND,((PROTOCOL,UDP),(DEST-PORT,443)),REJECT

